version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: cable_tracking_db
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: cable_user
      POSTGRES_PASSWORD: cable_pass
      POSTGRES_DB: cable_tracking
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
